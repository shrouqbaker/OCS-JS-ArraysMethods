    <script>
        // Exercise 1:
        function doubleValues(arr) {
            let newarr = [];
            arr.forEach(element => {
                newarr.push(element * 2);
            });
            return newarr;
        }

        let arr1 = [1, 2, 3];
        let arr2 = [5, 1, 2, 3, 10];

        console.log(doubleValues(arr1));
        console.log(doubleValues(arr2));

        // Exercise 2:
        function onlyEvenValues(arr) {
            let newarr = [];
            arr.forEach(element => {
                if (element % 2 == 0)
                    newarr.push(element);
            });
            return newarr;
        }
        console.log(onlyEvenValues(arr1));
        console.log(onlyEvenValues(arr2));

        // Exercise 3:
        function showFirstAndLast(arr) {
            let newarr = [];
            arr.forEach(element => {
                newarr.push(`${element[0]}${element[element.length - 1]}`);
            });
            return newarr;
        }
        let arr3 = ['colt', 'matt', 'tim', 'udemy'];
        let arr4 = ['hi', 'goodbye', 'smile'];

        console.log(showFirstAndLast(arr3));
        console.log(showFirstAndLast(arr4));

        // Exercise 4:
        function addKeyAndValue(arr, key, value) {
            let newarr = [];
            arr.forEach(element => {
                element[key] = value;
                newarr.push(element);
            });
            return newarr;
        }

        function vowelCount(str) {
            let vowel = [];
            let s = str.toLowerCase().split("");
            s.forEach(element => {
                if ("auieo".includes(element)) {
                    if (vowel[element])
                        vowel[element]++;
                    else {
                        vowel[element] = 1;
                    }
                }
            });
            return vowel
        }
